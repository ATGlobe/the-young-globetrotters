<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Ebook Store Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=USD"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8">

    <div id="storefront" class="max-w-4xl mx-auto bg-white rounded-[40px] shadow-2xl overflow-hidden border border-slate-100">
        <div class="p-8 md:p-12">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
                <div>
                    <h1 class="text-4xl font-black text-slate-900 mb-2">Ebook Store</h1>
                    <p class="text-slate-500">Select your digital adventures</p>
                </div>
                <div class="bg-blue-50 px-6 py-3 rounded-2xl border border-blue-100">
                    <span id="cart-count" class="text-blue-600 font-black">0 Items Selected</span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12" id="product-grid">
                <!-- Products will be injected here -->
            </div>

            <div id="checkout-section" class="hidden border-t border-slate-100 pt-12">
                <div class="flex justify-between items-center mb-8">
                    <span class="text-xl font-bold text-slate-500">Total Amount</span>
                    <span id="total-price" class="text-4xl font-black text-slate-900">$0.00</span>
                </div>
                <div id="paypal-button-container" class="max-w-md mx-auto"></div>
            </div>
        </div>
    </div>

    <!-- Thank You Modal -->
    <div id="success-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-md">
        <div class="bg-white rounded-[48px] p-10 md:p-16 max-w-2xl w-full text-center shadow-2xl">
            <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-8">
                <svg class="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-4xl font-black text-slate-900 mb-4">Success!</h2>
            <p class="text-slate-500 mb-10">Your digital downloads are ready below.</p>
            
            <div id="download-list" class="space-y-4 mb-10 text-left">
                <!-- Download links will be injected here -->
            </div>

            <button onclick="closeModal()" class="w-full py-5 bg-slate-900 text-white font-black rounded-2xl hover:bg-blue-600 transition-all">
                Close
            </button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, title: "Rome Adventure", price: 12.99, cover: "https://picsum.photos/seed/rome/300/400" },
            { id: 2, title: "Paris Discovery", price: 14.99, cover: "https://picsum.photos/seed/paris/300/400" },
            { id: 3, title: "London Explorer", price: 11.99, cover: "https://picsum.photos/seed/london/300/400" },
            { id: 4, title: "Tokyo Journey", price: 15.99, cover: "https://picsum.photos/seed/tokyo/300/400" }
        ];

        let selectedIds = new Set();

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div onclick="toggleProduct(${p.id})" class="cursor-pointer p-6 rounded-[32px] border-4 transition-all flex gap-4 ${selectedIds.has(p.id) ? 'border-blue-600 bg-blue-50/30' : 'border-slate-50 bg-slate-50/50 hover:border-blue-200'}">
                    <img src="${p.cover}" class="w-20 h-28 rounded-xl object-cover shadow-md">
                    <div class="flex flex-col justify-between py-1 flex-grow">
                        <div>
                            <h3 class="font-black text-slate-900">${p.title}</h3>
                            <p class="text-xs text-slate-400">Digital Ebook</p>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-lg font-black text-blue-600">$${p.price}</span>
                            ${selectedIds.has(p.id) ? '<div class="bg-blue-600 text-white p-1 rounded-full"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>' : ''}
                        </div>
                    </div>
                </div>
            `).join('');
            
            updateCart();
        }

        function toggleProduct(id) {
            if (selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
            renderProducts();
        }

        function updateCart() {
            const count = selectedIds.size;
            document.getElementById('cart-count').innerText = `${count} Item${count !== 1 ? 's' : ''} Selected`;
            
            const checkout = document.getElementById('checkout-section');
            if (count > 0) {
                checkout.classList.remove('hidden');
                const total = Array.from(selectedIds).reduce((sum, id) => sum + products.find(p => p.id === id).price, 0);
                document.getElementById('total-price').innerText = `$${total.toFixed(2)}`;
                renderPayPal(total);
            } else {
                checkout.classList.add('hidden');
            }
        }

        function renderPayPal(amount) {
            document.getElementById('paypal-button-container').innerHTML = '';
            paypal.Buttons({
                createOrder: (data, actions) => {
                    return actions.order.create({
                        purchase_units: [{ amount: { value: amount.toFixed(2) } }]
                    });
                },
                onApprove: (data, actions) => {
                    return actions.order.capture().then(details => {
                        showSuccess();
                    });
                }
            }).render('#paypal-button-container');
        }

        function showSuccess() {
            const list = document.getElementById('download-list');
            const items = Array.from(selectedIds).map(id => products.find(p => p.id === id));
            
            list.innerHTML = items.map(item => `
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-14 bg-white rounded-lg shadow-sm overflow-hidden">
                            <img src="${item.cover}" class="w-full h-full object-cover">
                        </div>
                        <h4 class="font-bold text-slate-900 text-sm">${item.title}</h4>
                    </div>
                    <a href="#" class="px-4 py-2 bg-blue-600 text-white text-xs font-black rounded-lg hover:bg-blue-700 transition-all">Download</a>
                </div>
            `).join('');

            document.getElementById('success-modal').classList.remove('hidden');
            selectedIds.clear();
            renderProducts();
        }

        function closeModal() {
            document.getElementById('success-modal').classList.add('hidden');
        }

        renderProducts();
    </script>
</body>
</html>
